<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michael's Page</title>
  <style>
    :root {
      --bg: #f0fdf8;
      --bg2: #d8f5ec;
      --card: #ffffff;
      --text: #1e4035;
      --text2: #4a9070;
      --accent: #2ecc94;
      --accent2: #6ee7c0;
      --accent3: #0ea572;
      --border: #a7e8cf;
      --shadow: rgba(46, 204, 148, 0.18);
      --btn-text: #ffffff;
    }
    [data-theme="dark"] {
      --bg: #0c1f18;
      --bg2: #152b20;
      --card: #1a3329;
      --text: #c8f0e2;
      --text2: #6ecfab;
      --accent: #34d99e;
      --accent2: #7ddfc0;
      --accent3: #26b882;
      --border: #2a5e44;
      --shadow: rgba(52, 217, 158, 0.18);
      --btn-text: #0c1f18;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
      transition: background 0.4s, color 0.4s;
      position: relative;
      overflow-x: hidden;
    }

    /* Soft background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
      transition: background 0.4s;
    }
    body::before {
      width: 420px; height: 420px;
      background: var(--accent2);
      top: -120px; left: -100px;
    }
    body::after {
      width: 340px; height: 340px;
      background: var(--accent);
      bottom: -80px; right: -80px;
    }

    /* Dark mode toggle */
    .toggle-wrap {
      position: fixed;
      top: 18px; right: 18px;
      z-index: 200;
    }
    .toggle-btn {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 40px;
      padding: 7px 16px;
      font-size: 17px;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 12px var(--shadow);
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }
    .toggle-btn:hover { box-shadow: 0 4px 20px var(--shadow); }

    /* All content sits above blobs */
    .page { position: relative; z-index: 1; width: 100%; max-width: 560px; display: flex; flex-direction: column; align-items: center; }

    /* Time greeting */
    .time-greet {
      font-size: 13px;
      letter-spacing: 1.5px;
      color: var(--text2);
      margin-bottom: 28px;
      font-weight: 500;
    }

    /* Hero emoji */
    .hero-emoji {
      font-size: 88px;
      line-height: 1;
      margin-bottom: 22px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    /* Name */
    .name {
      font-size: 46px;
      font-weight: 800;
      letter-spacing: 3px;
      color: var(--accent3);
      margin-bottom: 14px;
      text-shadow: 0 2px 18px var(--shadow);
    }

    /* Typing intro */
    .intro-wrap {
      font-size: 18px;
      color: var(--text2);
      margin-bottom: 44px;
      min-height: 32px;
      letter-spacing: 0.5px;
      text-align: center;
    }
    .cursor {
      display: inline-block;
      width: 2px; height: 20px;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.85s steps(1) infinite;
    }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

    /* Hobby cards */
    .cards {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 54px;
      width: 100%;
    }
    .card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 22px;
      padding: 30px 20px 24px;
      width: 155px;
      text-align: center;
      box-shadow: 0 4px 18px var(--shadow);
      transition: transform 0.28s cubic-bezier(.23,1.1,.6,1), box-shadow 0.28s ease;
      cursor: default;
    }
    .card:hover {
      transform: translateY(-12px) scale(1.03);
      box-shadow: 0 18px 40px var(--shadow);
    }
    .card-emoji { font-size: 40px; display: block; margin-bottom: 12px; }
    .card-label { font-size: 15px; font-weight: 600; color: var(--text); }

    /* Greeting button */
    .greet-btn {
      background: linear-gradient(135deg, var(--accent3), var(--accent));
      color: var(--btn-text);
      border: none;
      border-radius: 50px;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 6px 24px var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .greet-btn:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 12px 32px var(--shadow); }
    .greet-btn:active { transform: scale(0.97); }

    /* Confetti canvas */
    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }

    /* Mobile */
    @media (max-width: 480px) {
      .hero-emoji { font-size: 64px; }
      .name { font-size: 34px; }
      .intro-wrap { font-size: 15px; }
      .card { width: 130px; padding: 22px 14px 18px; }
      .card-emoji { font-size: 32px; }
    }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<!-- Dark mode toggle -->
<div class="toggle-wrap">
  <button class="toggle-btn" id="toggleBtn" aria-label="다크모드 전환">
    <span id="toggleIcon">🌙</span>
    <span id="toggleLabel">다크</span>
  </button>
</div>

<div class="page">
  <div class="time-greet" id="timeGreet"></div>

  <div class="hero-emoji">🙌</div>

  <h1 class="name">Michael</h1>

  <p class="intro-wrap">
    <span id="typingText"></span><span class="cursor"></span>
  </p>

  <div class="cards">
    <div class="card">
      <span class="card-emoji">📖</span>
      <span class="card-label">시 읽기</span>
    </div>
    <div class="card">
      <span class="card-emoji">🎨</span>
      <span class="card-label">그림 그리기</span>
    </div>
    <div class="card">
      <span class="card-emoji">🎵</span>
      <span class="card-label">음악 감상</span>
    </div>
  </div>

  <button class="greet-btn" id="greetBtn">안녕하세요! 👋</button>
</div>

<script>
  /* ── Dark mode ── */
  const html = document.documentElement;
  const toggleBtn = document.getElementById('toggleBtn');
  const toggleIcon = document.getElementById('toggleIcon');
  const toggleLabel = document.getElementById('toggleLabel');
  let dark = false;

  toggleBtn.addEventListener('click', () => {
    dark = !dark;
    html.setAttribute('data-theme', dark ? 'dark' : 'light');
    toggleIcon.textContent = dark ? '☀️' : '🌙';
    toggleLabel.textContent = dark ? '라이트' : '다크';
  });

  /* ── Time greeting ── */
  function setTimeGreet() {
    const h = new Date().getHours();
    const el = document.getElementById('timeGreet');
    if (h >= 5 && h < 12)       el.textContent = '☀️ 좋은 아침이에요!';
    else if (h >= 12 && h < 18) el.textContent = '🌤️ 좋은 오후예요!';
    else                         el.textContent = '🌙 좋은 저녁이에요!';
  }
  setTimeGreet();

  /* ── Typing effect ── */
  const sentence = '합리적이며 섬세한 사람 ✨';
  let idx = 0;
  const typingEl = document.getElementById('typingText');

  function type() {
    if (idx < sentence.length) {
      typingEl.textContent += sentence[idx++];
      setTimeout(type, 75);
    }
  }
  setTimeout(type, 900);

  /* ── Confetti ── */
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let rafId = null;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const palette = [
    '#2ecc94','#6ee7c0','#0ea572','#ffd166','#ef8354',
    '#a8dadc','#ffb4a2','#b5ead7','#ffc8dd','#c3f0ca'
  ];

  function spawnParticles() {
    particles = [];
    for (let i = 0; i < 140; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * 120,
        r: Math.random() * 7 + 3,
        color: palette[Math.floor(Math.random() * palette.length)],
        vy: Math.random() * 3.5 + 1.8,
        vx: (Math.random() - 0.5) * 2.2,
        rot: Math.random() * 360,
        rotV: (Math.random() - 0.5) * 14,
        shape: Math.random() > 0.45 ? 'rect' : 'circle',
      });
    }
  }

  function drawParticle(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI / 180);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.88;
    if (p.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, p.r, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(-p.r, -p.r * 0.5, p.r * 2, p.r);
    }
    ctx.restore();
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.y += p.vy;
      p.x += p.vx;
      p.rot += p.rotV;
      drawParticle(p);
    });
    particles = particles.filter(p => p.y < canvas.height + 30);
    if (particles.length) {
      rafId = requestAnimationFrame(animate);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      rafId = null;
    }
  }

  document.getElementById('greetBtn').addEventListener('click', () => {
    if (rafId) cancelAnimationFrame(rafId);
    spawnParticles();
    animate();
  });
</script>
</body>
</html>
